        status: completed
        date: {ISO_DATE}
        type: change
        parent-tasks: ["[[task]]"]
        parent-impl: ["[[implementation_plan]]"]
        related-finding: null
        aliases: []
        tags: []
        schema-version: "6.0"
        completed-date: {ISO_DATE}T03:00:00+08:00
        verified-date: null
        archived-date: null
        ---

        # TC-A9 测试 close-chg

        ## 任务清单

        - [x] T-901 测试任务一
        - [x] T-902 测试任务二

        <!-- APPROVED -->

        ## 实施详情

        **背景（Why）**：测试 close-chg

        ## 工作记录

        | 日期 | 完成内容 |
        | --- | --- |
    - path: task.md
      content: |
        # 项目任务追踪

        ## 活跃任务

        - [x] [[chg-{date}-01]] TC-A9 测试 close-chg #change [tasks:: T-901~T-902]

        <!-- ARCHIVE -->
    - path: implementation_plan.md
      content: |
        # 实施计划

        ## 变更索引

        <!-- 格式：- [状态] [[wikilink]] 标题 #change [tasks::] -->

        - [x] [[chg-{date}-01]] TC-A9 测试 close-chg #change [tasks:: T-901~T-902]

        <!-- ARCHIVE -->

input:
  operation: close-chg
  fields:
    target: "CHG-{DATE_UPPER}-01"
    verification-confirmed: true
    verify-summary: "TC-A9 验证通过"
    walkthrough-summary: "TC-A9 close-chg 收尾完成"

expected:
  status: SUCCESS
  files_modified:
    - "changes/chg-{date}-01.md"
    - task.md
    - implementation_plan.md
    - walkthrough.md
  validations:
    frontmatter_status: archived
    verified_date_set: true
    verified_marker_set: true
    archived_date_set: true
    task_md_index_below_archive: true
    impl_plan_index_below_archive: true
    walkthrough_row_added: true
    work_record_contains: "验证通过：TC-A9 验证通过"
  max_tokens: 70000
  max_duration_ms: 360000
  max_tool_uses: 24
  report_title_prefix_allowed: true

teardown:
  cleanup: true
