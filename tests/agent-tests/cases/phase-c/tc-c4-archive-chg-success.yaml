id: TC-C4
phase: C
indication: archive-chg-success-contract
description: archive-chg 在 completed + VERIFIED + 全任务完成状态下只做归档与 walkthrough，不负责验证判断。

setup:
  fixture: empty-v6
  variables:
    project_path: /tmp/test-vault/empty-v6
    date: "{TODAY}"
  pre_files:
    - path: "changes/chg-{date}-01.md"
      content: |
        ---
        chg-id: CHG-{DATE_UPPER}-01
        status: completed
        date: {ISO_DATE}
        type: change
        parent-tasks: ["[[task]]"]
        parent-impl: ["[[implementation_plan]]"]
        related-finding: null
        aliases: []
        tags: []
        schema-version: "6.0"
        completed-date: {ISO_DATE}T03:00:00+08:00
        verified-date: {ISO_DATE}T03:30:00+08:00
        archived-date: null
        ---

        # TC-C4 测试 archive-chg success

        ## 任务清单

        - [x] T-901 已完成任务
        - [x] T-902 已完成任务

        <!-- APPROVED -->
        <!-- VERIFIED -->

        ## 实施详情

        **背景（Why）**：测试 archive-chg 纯归档路径。

        ## 工作记录

        | 日期 | 完成内容 |
        | --- | --- |
        | {ISO_DATE} | 验证已完成 |
    - path: task.md
      content: |
        # 项目任务追踪

        ## 活跃任务

        - [x] [[chg-{date}-01]] TC-C4 测试 archive-chg success #change [tasks:: T-901~T-902]

        <!-- ARCHIVE -->
    - path: implementation_plan.md
      content: |
        # 实施计划

        ## 变更索引

        <!-- 格式：- [状态] [[wikilink]] 标题 #change [tasks::] -->

        - [x] [[chg-{date}-01]] TC-C4 测试 archive-chg success #change [tasks:: T-901~T-902]

        <!-- ARCHIVE -->

input:
  operation: archive-chg
  fields:
    target: "CHG-{DATE_UPPER}-01"
    walkthrough-summary: "TC-C4 archive-chg 纯归档成功"

expected:
  status: SUCCESS
  files_modified:
    - "changes/chg-{date}-01.md"
    - task.md
    - implementation_plan.md
    - walkthrough.md
  validations:
    frontmatter_status: archived
    verified_date_set: true
    verified_marker_set: true
    archived_date_set: true
    task_md_index_below_archive: true
    impl_plan_index_below_archive: true
    walkthrough_row_added: true
  max_tokens: 50000
  max_duration_ms: 240000
  max_tool_uses: 18
  report_title_prefix_allowed: true

teardown:
  cleanup: true
