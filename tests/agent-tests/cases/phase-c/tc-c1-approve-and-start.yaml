id: TC-C1
phase: C
indication: approve-and-start-contract
description: C 阶段用户已确认批准并立即开始时，update-chg action=approve-and-start 一次完成 APPROVED 标记、首任务启动、frontmatter 与根索引状态联动。

setup:
  fixture: empty-v6
  variables:
    project_path: /tmp/test-vault/empty-v6
    date: "{TODAY}"
  pre_files:
    - path: "changes/chg-{date}-01.md"
      content: |
        ---
        chg-id: CHG-{DATE_UPPER}-01
        status: planned
        date: {ISO_DATE}
        type: change
        parent-tasks: ["[[task]]"]
        parent-impl: ["[[implementation_plan]]"]
        related-finding: null
        aliases: []
        tags: []
        schema-version: "6.0"
        completed-date: null
        verified-date: null
        archived-date: null
        ---

        # TC-C1 测试 approve-and-start

        ## 任务清单

        - [ ] T-901 启动任务一
        - [ ] T-902 后续任务二

        ## 实施详情

        **背景（Why）**：测试 C 阶段 approve-and-start contract

        ## 工作记录

        | 日期 | 完成内容 |
        | --- | --- |
    - path: task.md
      content: |
        # 项目任务追踪

        ## 活跃任务

        - [ ] [[chg-{date}-01]] TC-C1 测试 approve-and-start #change [tasks:: T-901~T-902]

        <!-- ARCHIVE -->
    - path: implementation_plan.md
      content: |
        # 实施计划

        ## 变更索引

        <!-- 格式：- [状态] [[wikilink]] 标题 #change [tasks::] -->

        - [ ] [[chg-{date}-01]] TC-C1 测试 approve-and-start #change [tasks:: T-901~T-902]

        <!-- ARCHIVE -->

input:
  operation: update-chg
  fields:
    target: "CHG-{DATE_UPPER}-01"
    action: approve-and-start
    task-id: T-901
    approval-confirmed: true

expected:
  status: SUCCESS
  files_modified:
    - "changes/chg-{date}-01.md"
    - task.md
    - implementation_plan.md
  validations:
    frontmatter_status: in-progress
    approved_marker_set: true
    detail_task_status:
      T-901: "/"
      T-902: " "
    task_md_index_checkbox: "/"
    impl_plan_index_checkbox: "/"
  max_tokens: 50000
  max_duration_ms: 240000
  max_tool_uses: 16
  report_title_prefix_allowed: true

teardown:
  cleanup: true
