id: TC-C3
phase: C
indication: close-chg-success-contract
description: close-chg 在主 session 已确认验证通过后，一次完成未完成任务收口、VERIFIED、归档和 walkthrough。

setup:
  fixture: empty-v6
  variables:
    project_path: /tmp/test-vault/empty-v6
    date: "{TODAY}"
  pre_files:
    - path: "changes/chg-{date}-01.md"
      content: |
        ---
        chg-id: CHG-{DATE_UPPER}-01
        status: in-progress
        date: {ISO_DATE}
        type: change
        parent-tasks: ["[[task]]"]
        parent-impl: ["[[implementation_plan]]"]
        related-finding: null
        aliases: []
        tags: []
        schema-version: "6.0"
        completed-date: null
        verified-date: null
        archived-date: null
        ---

        # TC-C3 测试 close-chg success

        ## 任务清单

        - [x] T-901 已完成任务
        - [/] T-902 验证前仍在进行的任务

        <!-- APPROVED -->

        ## 实施详情

        **背景（Why）**：测试 close-chg 对 open task 的一次性收口。

        ## 工作记录

        | 日期 | 完成内容 |
        | --- | --- |
        | {ISO_DATE} | T-901 已完成 |
    - path: task.md
      content: |
        # 项目任务追踪

        ## 活跃任务

        - [/] [[chg-{date}-01]] TC-C3 测试 close-chg success #change [tasks:: T-901~T-902]

        <!-- ARCHIVE -->
    - path: implementation_plan.md
      content: |
        # 实施计划

        ## 变更索引

        <!-- 格式：- [状态] [[wikilink]] 标题 #change [tasks::] -->

        - [/] [[chg-{date}-01]] TC-C3 测试 close-chg success #change [tasks:: T-901~T-902]

        <!-- ARCHIVE -->

input:
  operation: close-chg
  fields:
    target: "CHG-{DATE_UPPER}-01"
    verification-confirmed: true
    complete-open-tasks: true
    verify-summary: "TC-C3 主 session 已运行并读取验证结果"
    walkthrough-summary: "TC-C3 close-chg 合并收尾成功"

expected:
  status: SUCCESS
  files_modified:
    - "changes/chg-{date}-01.md"
    - task.md
    - implementation_plan.md
    - walkthrough.md
  validations:
    frontmatter_status: archived
    completed_date_set: true
    verified_date_set: true
    verified_marker_set: true
    archived_date_set: true
    detail_task_status:
      T-901: "x"
      T-902: "x"
    task_md_index_below_archive: true
    impl_plan_index_below_archive: true
    walkthrough_row_added: true
    work_record_contains: "验证通过：TC-C3 主 session 已运行并读取验证结果"
  max_tokens: 70000
  max_duration_ms: 360000
  max_tool_uses: 24
  report_title_prefix_allowed: true

teardown:
  cleanup: true
